<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NZ Jul '26">
<meta name="theme-color" content="#F2F2F7">
<title>NZ · South Island · Jul 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── iOS 26 Liquid Glass Design System ── */
:root{
  /* System colours */
  --sys-bg:          #F2F2F7;
  --sys-bg2:         #FFFFFF;
  --sys-bg3:         #E5E5EA;
  --sys-grouped:     #F2F2F7;
  --sys-separator:   rgba(60,60,67,.18);
  --sys-fill:        rgba(120,120,128,.12);
  --sys-fill2:       rgba(120,120,128,.16);
  --sys-fill3:       rgba(118,118,128,.24);
  /* Labels */
  --label:           #000000;
  --label2:          rgba(60,60,67,.60);
  --label3:          rgba(60,60,67,.30);
  --label4:          rgba(60,60,67,.18);
  /* Tints */
  --blue:            #007AFF;
  --blue-bg:         rgba(0,122,255,.10);
  --blue-border:     rgba(0,122,255,.25);
  --green:           #34C759;
  --green-bg:        rgba(52,199,89,.10);
  --green-border:    rgba(52,199,89,.25);
  --orange:          #FF9500;
  --orange-bg:       rgba(255,149,0,.10);
  --orange-border:   rgba(255,149,0,.25);
  --red:             #FF3B30;
  --red-bg:          rgba(255,59,48,.10);
  --red-border:      rgba(255,59,48,.22);
  --purple:          #AF52DE;
  --purple-bg:       rgba(175,82,222,.10);
  /* Liquid glass */
  --glass:           rgba(255,255,255,.72);
  --glass-border:    rgba(255,255,255,.55);
  --glass-shadow:    0 2px 20px rgba(0,0,0,.10),0 0 0 .5px rgba(0,0,0,.06);
  --glass-shadow2:   0 8px 32px rgba(0,0,0,.12),0 0 0 .5px rgba(0,0,0,.06);
  /* Layout */
  --r-sm:  10px;
  --r:     16px;
  --r-lg:  20px;
  --r-xl:  28px;
  --tabh:  83px;
  --sab:   env(safe-area-inset-bottom,0px);
  --sat:   env(safe-area-inset-top,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --sys-bg:#1C1C1E;--sys-bg2:#2C2C2E;--sys-bg3:#3A3A3C;--sys-grouped:#1C1C1E;
    --sys-separator:rgba(84,84,88,.65);--sys-fill:rgba(120,120,128,.20);--sys-fill2:rgba(120,120,128,.28);--sys-fill3:rgba(118,118,128,.36);
    --label:#FFFFFF;--label2:rgba(235,235,245,.60);--label3:rgba(235,235,245,.30);--label4:rgba(235,235,245,.18);
    --glass:rgba(28,28,30,.78);--glass-border:rgba(255,255,255,.10);--glass-shadow:0 2px 20px rgba(0,0,0,.35),0 0 0 .5px rgba(255,255,255,.06);
    --glass-shadow2:0 8px 32px rgba(0,0,0,.45),0 0 0 .5px rgba(255,255,255,.06);
    --blue-bg:rgba(0,122,255,.18);--green-bg:rgba(52,199,89,.15);--orange-bg:rgba(255,149,0,.15);--red-bg:rgba(255,59,48,.15);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--sys-bg);}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif;
  font-size:17px;line-height:1.47;color:var(--label);
  -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;
}
img{display:block;width:100%;object-fit:cover;}
a{color:var(--blue);text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;height:100dvh;}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  background:var(--sys-bg);
  padding-bottom:calc(var(--tabh) + var(--sab));}
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .22s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ── NAVIGATION BAR ── */
.nav-bar{
  position:sticky;top:0;z-index:80;
  padding:calc(var(--sat) + 10px) 20px 12px;
  background:var(--glass);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--sys-separator);
}
.nav-title{font-size:17px;font-weight:600;color:var(--label);letter-spacing:-.3px;}
.nav-sub{font-size:13px;color:var(--label2);margin-top:1px;}

/* ── TAB BAR ── */
#tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--glass);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-top:.5px solid var(--sys-separator);
  display:flex;
  padding-bottom:var(--sab);
  height:calc(var(--tabh) + var(--sab));
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px 6px;
  color:var(--label3);font-size:10px;font-weight:500;letter-spacing:.02em;
  -webkit-tap-highlight-color:transparent;transition:color .12s;
}
.tab-item.active{color:var(--blue);}
.tab-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .1s;
}
.tab-item.active .tab-icon{background:var(--blue-bg);}
.tab-item:active .tab-icon{transform:scale(.88);}
.tab-item svg{width:22px;height:22px;stroke-width:1.6;fill:none;stroke:currentColor;}

/* ── SEGMENT CONTROL (iOS pill) ── */
.segment-wrap{padding:0 16px 14px;}
.segment{
  display:flex;background:var(--sys-fill);border-radius:10px;padding:2px;
  -webkit-tap-highlight-color:transparent;
}
.seg-btn{
  flex:1;padding:7px 4px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--label2);text-align:center;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.seg-btn.active{
  background:var(--glass);color:var(--label);
  box-shadow:0 1px 4px rgba(0,0,0,.15),0 0 0 .5px rgba(0,0,0,.06);
}

/* ── FILTER CHIPS (horizontal scroll) ── */
.chip-row{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  border:.5px solid var(--sys-separator);background:var(--glass);color:var(--label2);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.30);}

/* ── GLASS CARD ── */
.gcard{
  background:var(--glass);border:.5px solid var(--glass-border);
  border-radius:var(--r-lg);box-shadow:var(--glass-shadow);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow:hidden;margin:0 16px 12px;
}
.gcard-body{padding:16px;}
.gcard-img{height:160px;position:relative;}
.gcard-img img{height:100%;}
.gcard-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.55) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:14px 16px;
}
.gcard-img-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.gcard-img-sub{font-size:13px;color:rgba(255,255,255,.80);margin-top:2px;}

/* ── HERO CARD (home) ── */
.hero-card{
  margin:16px 16px 12px;border-radius:var(--r-xl);overflow:hidden;
  box-shadow:var(--glass-shadow2);position:relative;
}
.hero-card img{height:220px;}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(0,0,0,.08) 0%,rgba(0,0,0,.62) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:20px;
}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:4px;}
.hero-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.15;}
.hero-sub{font-size:14px;color:rgba(255,255,255,.80);margin-top:4px;}
.hero-badge{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.20);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:.5px solid rgba(255,255,255,.35);border-radius:20px;
  padding:5px 11px;font-size:12px;font-weight:600;color:#fff;
}

/* ── WEATHER CARD ── */
.wx-card{
  margin:0 16px 12px;border-radius:var(--r-lg);overflow:hidden;
  background:linear-gradient(135deg,#1a6ef5 0%,#0a4bbf 100%);
  box-shadow:0 4px 20px rgba(26,110,245,.35),0 0 0 .5px rgba(255,255,255,.15);
}
.wx-inner{padding:16px 18px 14px;display:flex;gap:14px;align-items:center;}
.wx-icon{font-size:48px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.2));}
.wx-right{flex:1;}
.wx-temp{font-size:38px;font-weight:300;color:#fff;letter-spacing:-1px;line-height:1;}
.wx-cond{font-size:15px;color:rgba(255,255,255,.90);margin-top:2px;}
.wx-loc{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;}
.wx-row{display:flex;border-top:.5px solid rgba(255,255,255,.18);padding:10px 18px;}
.wx-item{flex:1;text-align:center;border-right:.5px solid rgba(255,255,255,.18);}
.wx-item:last-child{border-right:none;}
.wx-item .wv{font-size:15px;font-weight:600;color:#fff;}
.wx-item .wl{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}

/* ── LIST ROW (iOS settings style) ── */
.list-section{margin:0 16px 20px;}
.list-section-label{font-size:13px;font-weight:400;color:var(--label2);text-transform:uppercase;letter-spacing:.04em;padding:0 6px 8px;}
.list-card{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r-lg);box-shadow:var(--glass-shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;}
.list-row{display:flex;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--sys-separator);gap:12px;-webkit-tap-highlight-color:transparent;}
.list-row:last-child{border-bottom:none;}
.list-row-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.list-row-body{flex:1;min-width:0;}
.list-row-title{font-size:15px;font-weight:500;color:var(--label);}
.list-row-sub{font-size:13px;color:var(--label2);margin-top:1px;}
.list-row-right{font-size:13px;color:var(--label2);text-align:right;flex-shrink:0;}
.list-row-chev{color:var(--label3);flex-shrink:0;margin-left:4px;}
.list-row-chev svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;}

/* ── ACT ROW ── */
.act-row2{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:.5px solid var(--sys-separator);}
.act-row2:last-child{border-bottom:none;}
.act-ico{
  width:38px;height:38px;border-radius:10px;background:var(--sys-fill);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.act-meta{flex:1;min-width:0;}
.act-title{font-size:15px;font-weight:600;color:var(--label);letter-spacing:-.2px;}
.act-detail{font-size:13px;color:var(--label2);margin-top:2px;line-height:1.45;}
.act-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}

/* ── LINK BUTTON ── */
.lbtn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;color:var(--blue);
  padding:6px 13px;border-radius:20px;
  border:.5px solid var(--blue-border);background:var(--blue-bg);
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.lbtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.lbtn:active{opacity:.7;}
.lbtn-green{color:var(--green);border-color:var(--green-border);background:var(--green-bg);}
.lbtn-phone{color:var(--green);border-color:var(--green-border);background:var(--green-bg);}

/* ── ALERT STRIPS ── */
.alert{border-radius:var(--r-sm);padding:11px 13px;font-size:14px;display:flex;gap:10px;margin-bottom:8px;line-height:1.4;}
.alert:last-child{margin-bottom:0;}
.alert-warn{background:var(--orange-bg);border:.5px solid var(--orange-border);color:var(--orange);}
.alert-danger{background:var(--red-bg);border:.5px solid var(--red-border);color:var(--red);}
.alert-info{background:var(--blue-bg);border:.5px solid var(--blue-border);color:var(--blue);}
.alert-good{background:var(--green-bg);border:.5px solid var(--green-border);color:var(--green);}

/* ── HOTEL BLOCK ── */
.hotel-block{background:var(--sys-fill);border-radius:var(--r-sm);overflow:hidden;margin-top:4px;}
.hotel-block img{height:110px;}
.hotel-block-body{padding:12px 13px;}
.hotel-name{font-size:15px;font-weight:600;color:var(--label);}
.hotel-meta{font-size:13px;color:var(--label2);margin-top:5px;line-height:1.6;}
.hotel-meta a{color:var(--blue);}

/* ── REF BADGE ── */
.ref-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--sys-fill2);border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:500;color:var(--label2);
  font-variant-numeric:tabular-nums;letter-spacing:.01em;margin-top:6px;
}
.ref-badge span{font-weight:700;color:var(--label);font-size:13px;}

/* ── BOOKING CARD (info tab) ── */
.bk-card{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r-lg);box-shadow:var(--glass-shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;margin-bottom:12px;}
.bk-head{padding:14px 16px;border-bottom:.5px solid var(--sys-separator);display:flex;align-items:center;gap:10px;}
.bk-head-icon{font-size:22px;}
.bk-head-title{font-size:15px;font-weight:600;color:var(--label);}
.bk-head-sub{font-size:12px;color:var(--label2);margin-top:1px;}
.bk-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 16px;border-bottom:.5px solid var(--sys-separator);gap:14px;}
.bk-row:last-child{border-bottom:none;}
.bk-row .k{font-size:13px;color:var(--label2);flex-shrink:0;max-width:46%;}
.bk-row .v{font-size:13px;color:var(--label);text-align:right;font-weight:500;}
.bk-row .v a{color:var(--blue);}
.bk-ref{background:var(--blue-bg);border:.5px solid var(--blue-border);border-radius:8px;padding:3px 8px;font-size:12px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:.01em;}

/* ── QUICK LINK GRID ── */
.ql-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 12px;}
.ql-btn{
  background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r);
  box-shadow:var(--glass-shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:14px 12px;display:flex;flex-direction:column;gap:6px;
  text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.ql-btn:active{opacity:.7;}
.ql-ico{font-size:24px;}
.ql-name{font-size:13px;font-weight:600;color:var(--label);line-height:1.3;}
.ql-sub{font-size:11px;color:var(--label2);line-height:1.3;}

/* ── SECTION HEADER ── */
.sec-head{padding:20px 16px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.sec-head h2{font-size:20px;font-weight:700;color:var(--label);letter-spacing:-.4px;}
.sec-head .seeall{font-size:15px;font-weight:400;color:var(--blue);}

/* ── PROGRESS ── */
.prog-bar-wrap{margin:0 16px 14px;}
.prog-track{height:4px;background:var(--sys-fill2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#55B1FF);border-radius:2px;transition:width .6s ease;}
.prog-meta{display:flex;justify-content:space-between;margin-top:5px;}
.prog-meta span{font-size:11px;color:var(--label3);}

/* ── MAP ── */
.map-filter-row{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.map-filter-row::-webkit-scrollbar{display:none;}
#map-frame-wrap{margin:0 16px;border-radius:var(--r-lg);overflow:hidden;border:.5px solid var(--glass-border);box-shadow:var(--glass-shadow2);}
#map-frame-wrap iframe{width:100%;display:block;border:none;}
.map-poi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 16px 0;}
.map-poi-card{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r);box-shadow:var(--glass-shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 13px;}
.map-poi-card.h{display:none;}
.map-poi-name{font-size:13px;font-weight:600;color:var(--label);line-height:1.3;}
.map-poi-cat{font-size:10px;color:var(--label2);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.map-poi-links{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.map-poi-links a{font-size:12px;color:var(--blue);display:flex;align-items:center;gap:4px;}
.map-poi-links a svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}

/* ── EAT ── */
.eat-card{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r-lg);box-shadow:var(--glass-shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;margin:0 16px 12px;}
.eat-card img{height:130px;}
.eat-body{padding:14px 15px;}
.eat-eyebrow{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;}
.eat-name{font-size:17px;font-weight:700;color:var(--label);letter-spacing:-.3px;}
.eat-desc{font-size:14px;color:var(--label2);margin-top:5px;line-height:1.45;}
.eat-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.eat-pill{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--sys-fill);color:var(--label2);border:.5px solid var(--sys-separator);}
.menu-box{margin-top:10px;background:var(--green-bg);border:.5px solid var(--green-border);border-radius:var(--r-sm);padding:11px 13px;}
.menu-hd{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--green);margin-bottom:7px;}
.menu-item{padding:4px 0;border-bottom:.5px solid rgba(52,199,89,.15);}
.menu-item:last-child{border-bottom:none;}
.menu-dish{font-size:14px;font-weight:500;color:var(--label);}
.menu-why{font-size:12px;color:var(--label2);margin-top:1px;}
.eat-tip{background:var(--orange-bg);border:.5px solid var(--orange-border);border-radius:var(--r-sm);padding:9px 11px;font-size:13px;color:var(--orange);margin-top:8px;display:flex;gap:7px;}
.eat-links{margin-top:10px;display:flex;flex-wrap:wrap;gap:7px;}
</style>
</head>
<body>
<div id="app">
<div id="scroll">

<!-- ══════════ HOME ══════════ -->
<div id="s-home" class="screen active">
  <div class="nav-bar">
    <div class="nav-title" id="home-nav-title">South Island · Jul '26</div>
    <div class="nav-sub" id="home-nav-sub">Mo &amp; Panteha · 30 Jun – 10 Jul</div>
  </div>

  <!-- Segment: Today / Leg / Full Trip -->
  <div style="padding:14px 16px 4px;">
    <div class="segment" id="home-seg">
      <button class="seg-btn active" onclick="setHomeView('today',this)">Today</button>
      <button class="seg-btn" onclick="setHomeView('leg',this)">This Leg</button>
      <button class="seg-btn" onclick="setHomeView('trip',this)">Full Trip</button>
    </div>
  </div>

  <div id="home-today"></div>
  <div id="home-leg" style="display:none"></div>
  <div id="home-trip" style="display:none"></div>
</div>

<!-- ══════════ MAP ══════════ -->
<div id="s-map" class="screen">
  <div class="nav-bar">
    <div class="nav-title">Map &amp; Places</div>
    <div class="nav-sub">All pinned locations · tap to filter</div>
  </div>
  <div style="height:10px;"></div>

async function buildWeather(td){
 const loc = (td>=0&&td<11)?WX_LOCS[td]:{n:'South Island',la:-44.5,lo:169.5};
 const el = document.getElementById('wx-card-slot');
 if(!el) return;
 el.innerHTML=`<div class="wx-card"><div class="wx-inner"><div class="wx-icon">🌡️</div><div class="wx-right"><div class="wx-temp">—</div><div class="wx-cond">Loading weather…</div><div class="wx-loc">${loc.n}</div></div></div></div>`;
 try{
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.la}&longitude=${loc.lo}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m&wind_speed_unit=kmh&timezone=Pacific%2FAuckland`);
  const j=await r.json(); const c=j.current;
  const ico=WMO_ICO[c.weather_code]||'🌡️';
  const txt=WMO_TXT[c.weather_code]||'—';
  el.innerHTML=`<div class="wx-card">
   <div class="wx-inner">
    <div class="wx-icon">${ico}</div>
    <div class="wx-right">
     <div class="wx-temp">${Math.round(c.temperature_2m)}°</div>
     <div class="wx-cond">${txt}</div>
     <div class="wx-loc">${loc.n} · feels like ${Math.round(c.apparent_temperature)}°C</div>
    </div>
   </div>
   <div class="wx-row">
    <div class="wx-item"><div class="wv">${Math.round(c.wind_speed_10m)}<span style="font-size:11px;font-weight:400"> km/h</span></div><div class="wl">Wind</div></div>
    <div class="wx-item"><div class="wv">${c.relative_humidity_2m}<span style="font-size:11px;font-weight:400">%</span></div><div class="wl">Humidity</div></div>
    <div class="wx-item"><div class="wv" style="font-size:13px;">NZT</div><div class="wl">Timezone</div></div>
   </div>
  </div>`;
 } catch(e){
  el.innerHTML=`<div class="wx-card" style="opacity:.6"><div class="wx-inner"><div class="wx-icon">📡</div><div class="wx-right"><div class="wx-temp" style="font-size:18px;">No signal</div><div class="wx-cond">Connect to internet for live weather</div><div class="wx-loc">${loc.n}</div></div></div></div>`;
 }
}

 let html='';

 // Progress
 const pct=Math.max(0,Math.min(100,(td/11)*100));
 const progLbl = td<0?`Starts in ${Math.abs(td)} day${Math.abs(td)===1?'':'s'}`
  : td>=11?'Trip complete ✓':`Day ${td+1} of 11`;
 html+=`<div style="padding:0 16px 4px;">
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="prog-meta"><span>${progLbl}</span><span>30 Jun – 10 Jul 2026</span></div>
 </div>`;

 // Weather slot
 html+=`<div id="wx-card-slot"></div>`;

 if(td>=0&&td<11){
  const d=DAYS[td];
  // Hero
  html+=`<div class="hero-card">
   <img src="${d.img}" alt="${d.place}" loading="lazy" style="height:220px;">
   <div class="hero-overlay">
    <div class="hero-eyebrow">${new Date(d.date+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="hero-title">${d.place}</div>
    <div class="hero-sub">${d.tagline}</div>
   </div>
   <div class="hero-badge">Day ${td+1}</div>
  </div>`;

  // Today's activities
  html+=`<div class="sec-head"><h2>Today's Plan</h2></div>
  <div class="gcard"><div class="gcard-body">`;
  d.acts.forEach(a=>{
   html+=`<div class="act-row2">
    <div class="act-ico">${a.icon}</div>
    <div class="act-meta">
     <div class="act-title">${a.name}</div>
     <div class="act-detail">${a.detail}</div>
     ${a.links.length?`<div class="act-links">${a.links.join('')}</div>`:''}
    </div>
   </div>`;
  });
  html+='</div></div>';

  // Hotel if checking in today
  if(d.hotel){
   const h=d.hotel;
   html+=`<div class="sec-head"><h2>Tonight's Stay</h2></div>
   <div class="gcard">
    <img src="${h.img}" alt="${h.name}" style="height:130px;">
    <div class="gcard-body">
     <div class="act-title">${h.name}</div>
     <div class="hotel-meta" style="margin-top:6px;">📍 ${h.addr}<br>📞 <a href="tel:${h.phone}">${h.display}</a><br>ℹ️ ${h.note}</div>
     <div class="ref-badge">Ref <span>${BOOKINGS.find(b=>b.title.includes(h.name.split(' ').slice(0,2).join(' ')))?BOOKINGS.find(b=>b.rows.some(r=>r.v&&r.v.includes&&r.v.includes('ANZ')||false)):'—'}</span></div>
     <div class="act-links" style="margin-top:10px;">${lbtn('Website',h.website)} ${lbtn('Map',mapsUrl(h.addr))}</div>
    </div>
   </div>`;
  }

  // Warns
  if(d.warns.length||d.notes.length){
   html+=`<div style="padding:0 16px 4px;">`;
   d.warns.forEach(w=>{html+=`<div class="alert alert-danger">⚠️ <span>${w}</span></div>`;});
   d.notes.forEach(n=>{html+=`<div class="alert alert-info">💡 <span>${n}</span></div>`;});
   html+=`</div>`;
  }
 } else if(td<0){
  // Pre-trip
  html+=`<div class="hero-card">
   <img src="https://images.unsplash.com/photo-1507699622108-4be3abd695ad?w=900&q=75" alt="NZ" style="height:220px;">
   <div class="hero-overlay">
    <div class="hero-eyebrow">Departing 30 Jun 2026</div>
    <div class="hero-title">South Island, New Zealand</div>
    <div class="hero-sub">Te Anau · Queenstown · Wanaka · Tekapo · Christchurch</div>
   </div>
   <div class="hero-badge">${Math.abs(td)}d to go</div>
  </div>`;
 } else {
  html+=`<div style="padding:32px 16px;text-align:center;color:var(--label2);">
   <div style="font-size:48px;margin-bottom:12px;">🏔️</div>
   <div style="font-size:20px;font-weight:600;color:var(--label);margin-bottom:6px;">Trip complete!</div>
   <div style="font-size:15px;">Hope it was incredible.</div>
  </div>`;
 }

 // Always-on alerts
 html+=`<div style="padding:0 16px 8px;">
  <div class="alert alert-warn">🗓️ <span>NZ School Holidays 4–19 Jul – ski areas and restaurants will be busier. Book ahead.</span></div>
  <div class="alert alert-info">🚗 <span>Drive on the left · Australian licence valid · RAV4 drop-off Christchurch Airport by 13:00 on 10 Jul.</span></div>
  <div class="alert alert-info">🌡️ <span>July temperatures: Queenstown 1–9°C · Wanaka 0–8°C · Tekapo −3–6°C. Thermal layers essential.</span></div>
 </div>`;

 html+='<div style="height:8px;"></div>';
 el.innerHTML=html;
 buildWeather(td);
}

// ═══════════════════════════════════════════════════════════
// HOME – LEG VIEW
// ═══════════════════════════════════════════════════════════
function buildLeg(){
 const td=tripDay();
 const el=document.getElementById('home-leg');
 if(el.dataset.built) return;
 el.dataset.built='1';
 // Find current leg
 const curLegIdx = td>=0&&td<11 ? DAYS[td].leg : 0;
 const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

 let html='<div style="height:4px;"></div>';
 LEGS.forEach((leg,li)=>{
  const isCur = li===curLegIdx&&td>=0&&td<11;
  html+=`<div class="gcard" style="${isCur?'border-color:var(--blue);box-shadow:0 0 0 1.5px var(--blue),var(--glass-shadow2);':''}">
   <div class="gcard-img"><img src="${leg.img}" alt="${leg.name}" loading="lazy" style="height:160px;">
    <div class="gcard-img-overlay">
     ${isCur?'<div style="font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:4px;">CURRENT LEG</div>':''}
     <div class="gcard-img-title">${leg.name}</div>
     <div class="gcard-img-sub">${leg.dates}</div>
    </div>
   </div>
   <div class="gcard-body">
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;">${leg.tags.map(t=>`<span class="eat-pill">${t}</span>`).join('')}</div>`;

  leg.days.forEach(di=>{
   const d=DAYS[di];
   const dd=new Date(d.date+'T00:00:00');
   const isToday=Math.floor((today0()-new Date(d.date+'T00:00:00'))/86400000)===0;
   html+=`<div class="act-row2">
    <div class="act-ico" style="${isToday?'background:var(--blue-bg);':''}">
     <span style="font-size:12px;font-weight:700;color:${isToday?'var(--blue)':'var(--label2)'};">${dd.getDate()}<br><span style="font-size:9px;font-weight:500;">${months[dd.getMonth()]}</span></span>
    </div>
    <div class="act-meta">
     <div class="act-title" style="${isToday?'color:var(--blue);':''}">${d.place}</div>
     <div class="act-detail">${d.tagline}</div>
     <div class="act-links">${d.acts.flatMap(a=>a.links).slice(0,2).join('')}</div>
    </div>
   </div>`;
  });

  html+=`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">${leg.links.join('')}</div>
  </div></div>`;
 });
 html+='<div style="height:8px;"></div>';
 el.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// HOME – FULL TRIP VIEW
// ═══════════════════════════════════════════════════════════
function buildTrip(){
 const el=document.getElementById('home-trip');
 if(el.dataset.built) return;
 el.dataset.built='1';
 const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 const td=tripDay();

 let html='<div style="height:4px;"></div>';
 DAYS.forEach((d,i)=>{
  const dd=new Date(d.date+'T00:00:00');
  const past=i<td; const isT=i===td&&td>=0&&td<11;
  html+=`<div class="gcard" style="${isT?'border-color:var(--blue);':''}${past?'opacity:.55;':''}">
   <div class="gcard-img"><img src="${d.img}" alt="${d.place}" loading="lazy" style="height:130px;">
    <div class="gcard-img-overlay">
     ${isT?'<div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:3px;">TODAY</div>':''}
     <div class="gcard-img-title" style="font-size:15px;">${d.place}</div>
     <div class="gcard-img-sub">${dd.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}</div>
    </div>
   </div>
   <div class="gcard-body" style="padding:12px 14px;">
    <div class="act-detail" style="margin-bottom:8px;">${d.tagline}</div>
    ${d.hotel?`<div class="alert alert-info" style="margin-bottom:8px;">🏨 ${d.hotel.name} · ${d.hotel.nights} night${d.hotel.nights>1?'s':''}</div>`:''}
    ${d.warns.map(w=>`<div class="alert alert-danger" style="margin-bottom:6px;">⚠️ ${w}</div>`).join('')}
    <div class="act-links">${d.acts.flatMap(a=>a.links).slice(0,2).join('')}</div>
   </div>
  </div>`;
 });
 html+='<div style="height:8px;"></div>';
 el.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// HOME SEGMENT SWITCH
// ═══════════════════════════════════════════════════════════
function setHomeView(view,btn){
 document.querySelectorAll('#home-seg .seg-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
 document.getElementById('home-today').style.display='none';
 document.getElementById('home-leg').style.display='none';
 document.getElementById('home-trip').style.display='none';
 const panel=document.getElementById('home-'+view);
 panel.style.display='block';
 if(view==='leg') buildLeg();
 if(view==='trip') buildTrip();
 document.getElementById('scroll').scrollTop=0;
}

// ═══════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════
let mapReady=false;
let activeCat='All';

function buildMap(){
 if(mapReady) return; mapReady=true;
 const wrap=document.getElementById('map-frame-wrap');
 const h=Math.max(260,Math.floor(window.innerHeight*.40));
 wrap.style.height=h+'px';
 document.getElementById('gmap-iframe').style.height=h+'px';
 document.getElementById('gmap-iframe').src=`https://maps.google.com/maps?q=South+Island+New+Zealand&t=m&z=6&ie=UTF8&output=embed`;

 const fEl=document.getElementById('map-filters');
 MAP_CATS.forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip'+(cat==='All'?' active':'');
  b.textContent=cat;
  b.onclick=()=>filterMap(cat,b);
  fEl.appendChild(b);
 });

 const grid=document.getElementById('map-poi-grid');
 grid.innerHTML=POIS.map((p,i)=>`
  <div class="map-poi-card" data-cat="${p.cat}" id="mpoi-${i}">
   <div class="map-poi-name">${p.name}</div>
   <div class="map-poi-cat">${p.cat} · ${p.loc}</div>
   <div class="map-poi-links">
    <a href="${mapsUrl(p.q)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>Google Maps</a>
    ${p.web?`<a href="${p.web}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Website</a>`:''}
   </div>
  </div>`).join('');
}

function filterMap(cat,btn){
 activeCat=cat;
 document.querySelectorAll('#map-filters .chip').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
 document.querySelectorAll('.map-poi-card').forEach(c=>{
  c.classList.toggle('h',cat!=='All'&&c.dataset.cat!==cat);
 });
 const first=POIS.find(p=>cat==='All'||p.cat===cat);
 if(first) document.getElementById('gmap-iframe').src=`https://maps.google.com/maps?q=${encodeURIComponent(first.q)}&t=m&z=13&ie=UTF8&output=embed`;
}

// EAT
// ═══════════════════════════════════════════════════════════
function buildEat(){
 let html='';
 EAT.forEach(loc=>{
  html+=`<div style="padding:20px 16px 8px;"><span style="font-size:20px;font-weight:700;color:var(--label);letter-spacing:-.4px;">${loc.loc}</span> <span style="font-size:13px;color:var(--label2);">${loc.dates}</span></div>`;
  loc.places.forEach(p=>{
   const menu=p.menu.map(m=>`<div class="menu-item"><div class="menu-dish">🍴 ${m.d}</div><div class="menu-why">${m.w}</div></div>`).join('');
   html+=`<div class="eat-card">
    <img src="${p.img}" alt="${p.name}" loading="lazy" style="height:130px;">
    <div class="eat-body">
     <div class="eat-eyebrow">${p.type}</div>
     <div class="eat-name">${p.name}</div>
     <div class="eat-desc">${p.desc}</div>
     <div class="eat-pills">
      ${p.addr?`<span class="eat-pill">📍 ${p.addr}</span>`:''}
      ${p.hours?`<span class="eat-pill">🕐 ${p.hours}</span>`:''}
      ${p.price?`<span class="eat-pill">${p.price}</span>`:''}
     </div>
     <div class="menu-box"><div class="menu-hd">Order These</div>${menu}</div>
     ${p.tip?`<div class="eat-tip">💡 <span>${p.tip}</span></div>`:''}
     <div class="eat-links">${p.links.join('')}</div>
    </div>
   </div>`;
  });
 });
 html+='<div style="height:8px;"></div>';
 document.getElementById('eat-content').innerHTML=html;
}

   <div class="list-row"><div class="list-row-body"><div class="list-row-title">Currency</div><div class="list-row-sub">NZ Dollar (NZD) · mostly cashless</div></div><div class="list-row-right" style="color:var(--label2);">NZD</div></div>
   <div class="list-row"><div class="list-row-body"><div class="list-row-title">Driving</div><div class="list-row-sub">Australian licence valid · drive on the left</div></div></div>

// TAB NAV
// ═══════════════════════════════════════════════════════════
function goTab(name){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
 document.getElementById('s-'+name).classList.add('active');
 document.querySelector(`[data-s="${name}"]`).classList.add('active');
 document.getElementById('scroll').scrollTop=0;
 if(name==='map') buildMap();
}
